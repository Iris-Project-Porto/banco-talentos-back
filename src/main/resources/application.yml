spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/talentos}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
  brevo:
    api-key: ${BREVO_API_KEY}
    from-email: ${BREVO_FROM_EMAIL}
    from-name: ${BREVO_NAME}

server:
  port: ${PORT:8080}

app:
  url: ${FRONT_URL:http://localhost:3000}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET:super-secret-key-at-least-32-chars-long-for-hs256}
    expiration-ms: 86400000

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.vilt: ${LOG_LEVEL:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
