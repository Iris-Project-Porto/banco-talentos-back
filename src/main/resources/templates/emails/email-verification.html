<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', Arial, sans-serif; line-height: 1.6; color: #2c3848; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        .header { background-color: #2c3848; color: #ffffff; padding: 20px; text-align: center; border-radius: 8px 8px 0 0; border-bottom: 4px solid #e81464; }
        .content { padding: 30px 20px; background-color: #ffffff; }
        .footer { font-size: 0.8em; color: #777; text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .code { font-size: 24px; font-weight: 700; color: #e81464; letter-spacing: 5px; text-align: center; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h2>BANCO DE TALENTOS - VILT</h2></div>
        <div class="content">
            <h3 style="color: #2c3848; font-weight: 700;">Verifique seu e-mail</h3>
            <p>Olá, <strong><span th:text="${userName}">Usuário</span></strong>!</p>
            <p>Obrigado por se registrar no Banco de Talentos. Use o código abaixo para confirmar seu e-mail:</p>
            <div class="code" th:text="${code}">123456</div>
            <p>Se você não solicitou este registro, por favor ignore este e-mail.</p>
        </div>
        <div class="footer"><p>&copy; 2026 VILT Group</p></div>
    </div>
</body>
</html>
